<!DOCTYPE html>
<html>
<head>
    <title>Hive Mind Performance Dashboard</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; }
        .metric { background: #f5f5f5; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .metric-value { font-size: 24px; font-weight: bold; color: #0073aa; }
        .status-pass { color: #46b450; }
        .status-fail { color: #dc3232; }
    </style>
</head>
<body>
    <h1>🎯 Hive Mind Performance Dashboard</h1>
    <div id="metrics"></div>

    <script>
        function updateDashboard() {
            if (window.hiveMindMonitor) {
                const report = window.hiveMindMonitor.generateReport();
                const html = `
                    <div class="metric">
                        <h3>Total Render Time</h3>
                        <div class="metric-value">${report.performance.totalRenderTime}</div>
                        <div>Target: ${report.thresholds.targetRenderTime}</div>
                    </div>
                    <div class="metric">
                        <h3>Fidelity Score</h3>
                        <div class="metric-value ${report.quality.status === 'EXCELLENT' ? 'status-pass' : ''}">${report.quality.fidelityScore}/100</div>
                        <div>Status: ${report.quality.status}</div>
                    </div>
                `;
                document.getElementById('metrics').innerHTML = html;
            }
        }

        setInterval(updateDashboard, 1000);
    </script>
</body>
</html>
